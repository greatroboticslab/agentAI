# LLM Configuration

provider: "openai_compatible"

openai_compatible:
  api_base: "http://localhost:8000/v1"  # vLLM or Ollama endpoint on supercomputer
  api_key: "not-needed"
  model: "meta-llama/Llama-3.1-8B-Instruct"
  max_tokens: 2048
  temperature: 0.3
  timeout: 10

# Fallback options
fallback:
  enabled: false
  provider: "openai"
  model: "gpt-4o-mini"
